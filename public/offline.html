<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin conexión - Rutas Colombia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f2d52 0%, #1e3a5f 50%, #063B32 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #f8f5ef;
        }

        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #10b981;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #f8f5ef;
        }

        p {
            font-size: 1rem;
            line-height: 1.6;
            color: rgba(248, 245, 239, 0.8);
            margin-bottom: 2rem;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            color: rgba(248, 245, 239, 0.3);
        }

        button {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .status {
            margin-top: 2rem;
            font-size: 0.875rem;
            color: rgba(248, 245, 239, 0.5);
        }

        .status.online {
            color: #10b981;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <i class="fas fa-wifi"></i>
        </div>
        <h1>Sin conexión</h1>
        <p>
            No pudimos cargar destinos en este momento.<br>
            Revisa tu conexión e inténtalo nuevamente.
        </p>
        <button onclick="window.location.reload()">
            <i class="fas fa-redo"></i> Reintentar
        </button>
        <div class="status" id="connection-status">
            Verificando conexión...
        </div>
    </div>

    <script>
        // Verificar conexión periódicamente
        function checkConnection() {
            const statusEl = document.getElementById('connection-status');
            
            if (navigator.onLine) {
                statusEl.textContent = 'Conexión restaurada. Recargando...';
                statusEl.classList.add('online');
                setTimeout(() => {
                    window.location.reload();
                }, 1000);
            } else {
                statusEl.textContent = 'Sin conexión a internet';
                statusEl.classList.remove('online');
            }
        }

        // Verificar al cargar
        checkConnection();

        // Escuchar cambios de conexión
        window.addEventListener('online', checkConnection);
        window.addEventListener('offline', checkConnection);
    </script>
</body>
</html>
